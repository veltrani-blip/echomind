<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Echomind</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
margin-top:50px;
}

#chat{
width:400px;
height:400px;
border:1px solid #444;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
}

input{
width:300px;
padding:10px;
}

button{
padding:10px;
}
</style>
</head>

<body>

<h1>Echomind</h1>

<div id="chat"></div>

<input id="msg" placeholder="Digite..." />
<button onclick="send()">Enviar</button>

<script>
async function send(){

const input = document.getElementById("msg");
const chat = document.getElementById("chat");

const message = input.value;

chat.innerHTML += "<div><b>Você:</b> "+message+"</div>";

const res = await fetch("http://localhost:3000/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message})
});

const data = await res.json();

chat.innerHTML += "<div><b>Echomind:</b> "+data.reply+"</div>";

input.value="";
}
</script>

</body>
</html>
